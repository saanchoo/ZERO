<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1A1612">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<title>ZERO</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
--cream:#E8DCC8;
--card:#D4C4A8;
--dark:#1A1612;
--black:#0D0B09;
--text:#0D0B09;
--muted:#6B5C47;
--success:#3D2B1A;
}
html,body{
height:100%;
background:#E8DCC8;
font-family:'Courier New',monospace;
color:#0D0B09;
overflow:hidden;
}
#app{
max-width:430px;
margin:0 auto;
height:100vh;
display:flex;
flex-direction:column;
position:relative;
background:#E8DCC8;
}
.screen{
display:none;
flex:1;
overflow-y:auto;
padding:20px 20px 90px;
}
.screen.active{display:block;}
.card{
background:#D4C4A8;
border:1.5px solid #0D0B09;
box-shadow:3px 3px 0px #0D0B09;
border-radius:4px;
padding:20px;
margin-bottom:16px;
}
.date-header{
font-size:28px;
font-weight:700;
letter-spacing:4px;
text-transform:uppercase;
margin-bottom:20px;
}
.streak-box{
display:flex;
align-items:center;
gap:12px;
padding:16px 20px;
background:#D4C4A8;
border:1.5px solid #0D0B09;
box-shadow:3px 3px 0px #0D0B09;
border-radius:4px;
margin-bottom:16px;
}
.streak-icon{
color:#0D0B09;
display:flex;
align-items:center;
}
.streak-icon svg{width:32px;height:32px;}
.streak-num{
font-size:48px;
font-weight:700;
line-height:1;
}
.streak-label{
font-size:12px;
font-weight:700;
letter-spacing:3px;
color:#6B5C47;
text-transform:uppercase;
}
@keyframes pulse{
0%,100%{transform:scale(1);}
50%{transform:scale(1.15);}
}
.pulse .streak-icon{animation:pulse 0.8s ease-in-out infinite;}
.checklist{margin-bottom:16px;}
.check-item{
display:flex;
align-items:center;
gap:14px;
min-height:56px;
padding:12px 20px;
background:#D4C4A8;
border:1.5px solid #0D0B09;
box-shadow:3px 3px 0px #0D0B09;
border-radius:4px;
margin-bottom:10px;
cursor:pointer;
user-select:none;
transition:background 0.15s;
}
.check-item.done{
background:#3D2B1A;
color:#E8DCC8;
}
.check-item.done .check-label{
text-decoration:line-through;
color:#D4C4A8;
}
.check-item.done .item-icon svg{color:#E8DCC8;}
.item-icon{display:flex;align-items:center;}
.item-icon svg{width:20px;height:20px;color:#0D0B09;}
.check-label{
font-size:14px;
font-weight:700;
letter-spacing:2px;
text-transform:uppercase;
flex:1;
}
.check-mark{
width:24px;height:24px;
border:1.5px solid currentColor;
border-radius:2px;
display:flex;align-items:center;justify-content:center;
flex-shrink:0;
}
.check-mark svg{width:14px;height:14px;display:none;}
.check-item.done .check-mark svg{display:block;}
.progress-section{
background:#D4C4A8;
border:1.5px solid #0D0B09;
box-shadow:3px 3px 0px #0D0B09;
border-radius:4px;
padding:16px 20px;
}
.progress-label{
display:flex;
justify-content:space-between;
font-size:12px;
font-weight:700;
letter-spacing:3px;
color:#6B5C47;
margin-bottom:10px;
text-transform:uppercase;
}
.progress-track{
height:8px;
background:#0D0B09;
border-radius:2px;
overflow:hidden;
}
.progress-fill{
height:100%;
background:#E8DCC8;
border-radius:2px;
transition:width 0.3s ease;
}
.section-title{
font-size:11px;
font-weight:700;
letter-spacing:4px;
color:#6B5C47;
text-transform:uppercase;
margin-bottom:12px;
}
.input-row{
display:flex;
gap:10px;
margin-bottom:10px;
}
.input-group{
display:flex;
flex-direction:column;
flex:1;
gap:4px;
}
.input-group label{
font-size:10px;
font-weight:700;
letter-spacing:3px;
color:#6B5C47;
text-transform:uppercase;
}
.input-group input{
background:#E8DCC8;
border:1.5px solid #0D0B09;
border-radius:4px;
padding:10px 12px;
font-family:'Courier New',monospace;
font-size:15px;
font-weight:700;
color:#0D0B09;
width:100%;
outline:none;
}
.input-group input:focus{box-shadow:2px 2px 0px #0D0B09;}
.exercise-input{
background:#E8DCC8;
border:1.5px solid #0D0B09;
border-radius:4px;
padding:10px 12px;
font-family:'Courier New',monospace;
font-size:15px;
font-weight:700;
color:#0D0B09;
width:100%;
outline:none;
margin-bottom:12px;
}
.exercise-input:focus{box-shadow:2px 2px 0px #0D0B09;}
.sets-table{width:100%;border-collapse:collapse;margin-bottom:12px;}
.sets-table th{
font-size:10px;
font-weight:700;
letter-spacing:2px;
color:#6B5C47;
text-transform:uppercase;
padding:6px 8px;
text-align:left;
border-bottom:1.5px solid #0D0B09;
}
.sets-table td{
padding:6px 8px;
}
.sets-table td input{
background:#E8DCC8;
border:1.5px solid #0D0B09;
border-radius:2px;
padding:6px 8px;
font-family:'Courier New',monospace;
font-size:14px;
font-weight:700;
color:#0D0B09;
width:100%;
outline:none;
}
.set-num{
font-size:12px;
font-weight:700;
color:#6B5C47;
}
.add-set-btn{
display:flex;
align-items:center;
gap:8px;
background:none;
border:1.5px dashed #0D0B09;
border-radius:4px;
padding:10px 16px;
font-family:'Courier New',monospace;
font-size:12px;
font-weight:700;
letter-spacing:2px;
color:#6B5C47;
cursor:pointer;
text-transform:uppercase;
width:100%;
justify-content:center;
}
.add-set-btn svg{width:14px;height:14px;}
.add-set-btn:hover{background:#E8DCC8;}
.save-btn{
position:fixed;
bottom:72px;
left:50%;
transform:translateX(-50%);
width:calc(100% - 40px);
max-width:390px;
background:#0D0B09;
color:#E8DCC8;
border:none;
border-radius:4px;
padding:16px;
font-family:'Courier New',monospace;
font-size:14px;
font-weight:700;
letter-spacing:4px;
text-transform:uppercase;
cursor:pointer;
box-shadow:3px 3px 0px #6B5C47;
}
.save-btn:active{transform:translateX(-50%) translate(2px,2px);box-shadow:1px 1px 0px #6B5C47;}
.stats-placeholder{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:60vh;
gap:16px;
}
.stats-placeholder svg{width:64px;height:64px;color:#6B5C47;}
.stats-placeholder .coming-soon{
font-size:24px;
font-weight:700;
letter-spacing:6px;
color:#6B5C47;
text-transform:uppercase;
}
.chat-container{
display:flex;
flex-direction:column;
height:calc(100vh - 72px);
padding:0;
}
.chat-messages{
flex:1;
overflow-y:auto;
padding:20px 20px 0;
display:flex;
flex-direction:column;
gap:10px;
}
.chat-message{
max-width:80%;
padding:12px 14px;
border-radius:4px;
font-size:13px;
line-height:1.5;
font-weight:600;
}
.chat-message.system{
background:#D4C4A8;
border:1.5px solid #0D0B09;
box-shadow:2px 2px 0px #0D0B09;
align-self:flex-start;
}
.chat-message.user-msg{
background:#0D0B09;
color:#E8DCC8;
border:1.5px solid #0D0B09;
box-shadow:2px 2px 0px #6B5C47;
align-self:flex-end;
}
.chat-input-bar{
display:flex;
gap:10px;
padding:12px 20px;
background:#E8DCC8;
border-top:1.5px solid #0D0B09;
}
.chat-input{
flex:1;
background:#D4C4A8;
border:1.5px solid #0D0B09;
border-radius:4px;
padding:10px 14px;
font-family:'Courier New',monospace;
font-size:14px;
font-weight:600;
color:#0D0B09;
outline:none;
}
.chat-input:focus{box-shadow:2px 2px 0px #0D0B09;}
.chat-send{
background:#0D0B09;
color:#E8DCC8;
border:none;
border-radius:4px;
width:44px;
height:44px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
flex-shrink:0;
}
.chat-send svg{width:18px;height:18px;}
.chat-send:active{opacity:0.7;}
.bottom-nav{
position:fixed;
bottom:0;
left:50%;
transform:translateX(-50%);
width:100%;
max-width:430px;
height:72px;
background:#1A1612;
border-top:1.5px solid #0D0B09;
display:flex;
z-index:100;
}
.nav-tab{
flex:1;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:4px;
cursor:pointer;
color:#6B5C47;
border:none;
background:none;
font-family:'Courier New',monospace;
padding:8px 0;
transition:color 0.15s;
}
.nav-tab.active{color:#E8DCC8;}
.nav-tab svg{width:22px;height:22px;}
.nav-tab span{
font-size:9px;
font-weight:700;
letter-spacing:2px;
text-transform:uppercase;
}
</style>
</head>
<body>
<div id="app">

<div id="screen-today" class="screen active">
  <div id="date-header" class="date-header"></div>
  <div class="streak-box" id="streak-box">
    <div class="streak-icon"><i data-lucide="flame"></i></div>
    <div>
      <div class="streak-num" id="streak-num">0</div>
      <div class="streak-label">days</div>
    </div>
  </div>
  <div class="checklist" id="checklist">
    <div class="check-item" data-id="creatine" onclick="toggleCheck('creatine')">
      <div class="item-icon"><i data-lucide="zap"></i></div>
      <span class="check-label">Creatine</span>
      <div class="check-mark"><i data-lucide="check"></i></div>
    </div>
    <div class="check-item" data-id="workout" onclick="toggleCheck('workout')">
      <div class="item-icon"><i data-lucide="dumbbell"></i></div>
      <span class="check-label">Workout</span>
      <div class="check-mark"><i data-lucide="check"></i></div>
    </div>
    <div class="check-item" data-id="weight" onclick="toggleCheck('weight')">
      <div class="item-icon"><i data-lucide="scale"></i></div>
      <span class="check-label">Weight</span>
      <div class="check-mark"><i data-lucide="check"></i></div>
    </div>
    <div class="check-item" data-id="sleep" onclick="toggleCheck('sleep')">
      <div class="item-icon"><i data-lucide="moon"></i></div>
      <span class="check-label">Sleep</span>
      <div class="check-mark"><i data-lucide="check"></i></div>
    </div>
    <div class="check-item" data-id="calories" onclick="toggleCheck('calories')">
      <div class="item-icon"><i data-lucide="utensils"></i></div>
      <span class="check-label">Calories</span>
      <div class="check-mark"><i data-lucide="check"></i></div>
    </div>
  </div>
  <div class="progress-section">
    <div class="progress-label">
      <span>PROGRESS</span>
      <span id="progress-text">0 / 5</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
  </div>
</div>

<div id="screen-log" class="screen">
  <div class="card">
    <div class="section-title">Body</div>
    <div class="input-row">
      <div class="input-group">
        <label>Weight (kg)</label>
        <input type="number" id="log-weight" placeholder="0.0" step="0.1">
      </div>
      <div class="input-group">
        <label>Sleep (h)</label>
        <input type="number" id="log-sleep" placeholder="0.0" step="0.5">
      </div>
    </div>
    <div class="input-row">
      <div class="input-group">
        <label>Calories (kcal)</label>
        <input type="number" id="log-calories" placeholder="0">
      </div>
      <div class="input-group">
        <label>Protein (g)</label>
        <input type="number" id="log-protein" placeholder="0">
      </div>
    </div>
    <div class="input-row">
      <div class="input-group">
        <label>Carbs (g)</label>
        <input type="number" id="log-carbs" placeholder="0">
      </div>
      <div class="input-group">
        <label>Fat (g)</label>
        <input type="number" id="log-fat" placeholder="0">
      </div>
    </div>
  </div>
  <div class="card" style="margin-bottom:80px;">
    <div class="section-title">Workout</div>
    <input type="text" class="exercise-input" id="log-exercise" placeholder="EXERCISE NAME">
    <table class="sets-table" id="sets-table">
      <thead>
        <tr>
          <th>SET</th>
          <th>REPS</th>
          <th>KG</th>
        </tr>
      </thead>
      <tbody id="sets-body">
        <tr>
          <td><span class="set-num">1</span></td>
          <td><input type="number" placeholder="0" min="0"></td>
          <td><input type="number" placeholder="0" step="0.5" min="0"></td>
        </tr>
      </tbody>
    </table>
    <button class="add-set-btn" onclick="addSet()">
      <i data-lucide="plus"></i>
      ADD SET
    </button>
  </div>
  <button class="save-btn" onclick="saveLog()">SAVE</button>
</div>

<div id="screen-stats" class="screen">
  <div class="stats-placeholder">
    <i data-lucide="bar-chart-2"></i>
    <div class="coming-soon">Coming Soon</div>
  </div>
</div>

<div id="screen-ai" class="chat-container" style="display:none;">
  <div class="chat-messages" id="chat-messages">
    <div class="chat-message system">ZERO AI — connect your API to activate daily analysis.</div>
  </div>
  <div class="chat-input-bar">
    <input type="text" class="chat-input" id="chat-input" placeholder="ASK ZERO AI..." onkeydown="if(event.key==='Enter')sendChat()">
    <button class="chat-send" onclick="sendChat()"><i data-lucide="send"></i></button>
  </div>
</div>

<nav class="bottom-nav">
  <button class="nav-tab active" onclick="showTab('today',this)">
    <i data-lucide="home"></i>
    <span>Today</span>
  </button>
  <button class="nav-tab" onclick="showTab('log',this)">
    <i data-lucide="dumbbell"></i>
    <span>Log</span>
  </button>
  <button class="nav-tab" onclick="showTab('stats',this)">
    <i data-lucide="bar-chart-2"></i>
    <span>Stats</span>
  </button>
  <button class="nav-tab" onclick="showTab('ai',this)">
    <i data-lucide="message-square"></i>
    <span>AI</span>
  </button>
</nav>

</div>

<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script>
const ITEMS = ['creatine','workout','weight','sleep','calories'];
const DAYS = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
const MONTHS = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];

function todayStr(){
  const d=new Date();
  return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();
}

function formatDate(){
  const d=new Date();
  const day=DAYS[d.getDay()];
  const date=String(d.getDate()).padStart(2,'0');
  const month=MONTHS[d.getMonth()];
  return day+' '+date+' '+month;
}

function loadState(){
  const saved=localStorage.getItem('zero_state');
  if(!saved)return{date:'',checks:{},streak:0,streakDone:false};
  return JSON.parse(saved);
}

function saveState(state){
  localStorage.setItem('zero_state',JSON.stringify(state));
}

let state=loadState();
if(state.date!==todayStr()){
  state={date:todayStr(),checks:{},streak:state.streak,streakDone:false};
  saveState(state);
}

function renderToday(){
  document.getElementById('date-header').textContent=formatDate();
  document.getElementById('streak-num').textContent=state.streak;
  ITEMS.forEach(id=>{
    const el=document.querySelector('.check-item[data-id="'+id+'"]');
    if(state.checks[id]){
      el.classList.add('done');
    } else {
      el.classList.remove('done');
    }
  });
  const done=ITEMS.filter(id=>state.checks[id]).length;
  document.getElementById('progress-text').textContent=done+' / 5';
  document.getElementById('progress-fill').style.width=(done/5*100)+'%';
  const box=document.getElementById('streak-box');
  if(done===5){
    box.classList.add('pulse');
  } else {
    box.classList.remove('pulse');
  }
}

function toggleCheck(id){
  state.checks[id]=!state.checks[id];
  const done=ITEMS.filter(i=>state.checks[i]).length;
  if(done===5&&!state.streakDone){
    state.streak+=1;
    state.streakDone=true;
  }
  saveState(state);
  renderToday();
  lucide.createIcons();
}

function showTab(name,btn){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('#screen-ai').forEach(s=>s.style.display='none');
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  if(name==='ai'){
    document.getElementById('screen-ai').style.display='flex';
  } else {
    const s=document.getElementById('screen-'+name);
    s.classList.add('active');
  }
}

let setCount=1;
function addSet(){
  setCount++;
  const tbody=document.getElementById('sets-body');
  const tr=document.createElement('tr');
  tr.innerHTML='<td><span class="set-num">'+setCount+'</span></td><td><input type="number" placeholder="0" min="0"></td><td><input type="number" placeholder="0" step="0.5" min="0"></td>';
  tbody.appendChild(tr);
  lucide.createIcons();
}

function saveLog(){
  const entry={
    date:todayStr(),
    weight:document.getElementById('log-weight').value,
    sleep:document.getElementById('log-sleep').value,
    calories:document.getElementById('log-calories').value,
    protein:document.getElementById('log-protein').value,
    carbs:document.getElementById('log-carbs').value,
    fat:document.getElementById('log-fat').value,
    exercise:document.getElementById('log-exercise').value,
    sets:[]
  };
  const rows=document.querySelectorAll('#sets-body tr');
  rows.forEach((r,i)=>{
    const inputs=r.querySelectorAll('input');
    entry.sets.push({set:i+1,reps:inputs[0].value,kg:inputs[1].value});
  });
  const logs=JSON.parse(localStorage.getItem('zero_logs')||'[]');
  logs.push(entry);
  localStorage.setItem('zero_logs',JSON.stringify(logs));
  const btn=document.querySelector('.save-btn');
  btn.textContent='SAVED';
  setTimeout(()=>{btn.textContent='SAVE';},1500);
}

function sendChat(){
  const input=document.getElementById('chat-input');
  const val=input.value.trim();
  if(!val)return;
  const msgs=document.getElementById('chat-messages');
  const userDiv=document.createElement('div');
  userDiv.className='chat-message user-msg';
  userDiv.textContent=val;
  msgs.appendChild(userDiv);
  input.value='';
  const reply=document.createElement('div');
  reply.className='chat-message system';
  reply.textContent='API not connected. Add your Claude API key to activate.';
  msgs.appendChild(reply);
  msgs.scrollTop=msgs.scrollHeight;
}

renderToday();
lucide.createIcons();
</script>
</body>
</html>
